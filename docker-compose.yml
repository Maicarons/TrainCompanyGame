version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - mysql
    environment:
      - DATABASE_URL=mysql+pymysql://tcgame:tcgame_password@mysql:3306/tcgame
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./backend:/app/backend
    restart: unless-stopped

  redis:
    image: redis:6-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  mysql:
    image: mysql:8
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root_password
      - MYSQL_DATABASE=tcgame
      - MYSQL_USER=tcgame
      - MYSQL_PASSWORD=tcgame_password
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A backend.celery_app worker --loglevel=info
    depends_on:
      - backend
      - redis
    volumes:
      - ./backend:/app/backend
    restart: unless-stopped

volumes:
  redis_data:
  mysql_data: